<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>新增商品</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background:#FFF8F0; padding:20px; }
        .container {
            max-width:700px;
            margin:0 auto;
            background:#ffffff;
            padding:30px 36px;
            border-radius:24px;
            box-shadow:0 4px 24px rgba(180,130,100,0.08);
            border:1px solid #F0E6DD;
        }
        h2 { color:#5A3E2B; border-bottom:2px solid #F0E6DD; padding-bottom:12px; }
        .form-group { margin:20px 0; }
        label { display:block; font-weight:500; color:#5A3E2B; margin-bottom:4px; }
        input, select, textarea {
            width:100%;
            padding:12px 16px;
            background:#FAF6F2;
            border:2px solid #F0E6DD;
            border-radius:12px;
            font-size:15px;
            color:#5A3E2B;
            transition:0.3s;
            outline:none;
            box-sizing:border-box;
        }
        input:focus, select:focus, textarea:focus {
            border-color:#E8A87C;
            box-shadow:0 0 0 4px rgba(232,168,124,0.15);
            background:#fff;
        }
        textarea { height:80px; resize:vertical; }
        .btn {
            padding:10px 30px;
            border-radius:12px;
            text-decoration:none;
            font-size:15px;
            border:none;
            cursor:pointer;
            transition:0.3s;
        }
        .btn-primary { background:#E8A87C; color:#fff; }
        .btn-primary:hover { background:#D4835A; transform:translateY(-2px); }
        .btn-secondary { background:#F0E6DD; color:#5A3E2B; }
        .btn-secondary:hover { background:#E0D2C6; }
        .actions { margin-top:25px; display:flex; gap:16px; }
    </style>
</head>
<body>
<div class="container">
    <h2>➕ 新增商品</h2>
    <form th:action="@{/product/add}" method="post">
        <div class="form-group">
            <label>名称 *</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>图片URL</label>
            <input type="text" name="imageUrl" placeholder="/img/xxx.jpg">
        </div>
        <div class="form-group">
            <label>价格 *</label>
            <input type="number" name="price" step="0.01" required>
        </div>
        <div class="form-group">
            <label>库存</label>
            <input type="number" name="stock" min="0" value="0">
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea name="description"></textarea>
        </div>
        <div class="form-group">
            <label>分类 *</label>
            <select name="categoryId" required>
                <option value="">请选择</option>
                <option th:each="c : ${categoryList}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>状态</label>
            <select name="status">
                <option value="1">上架</option>
                <option value="0">下架</option>
            </select>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="/product/list" class="btn btn-secondary">返回列表</a>
        </div>
    </form>
</div>
</body>
</html>
